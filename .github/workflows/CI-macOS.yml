name: CI-macOS

on:
  push:
    branches: [ master ]

jobs:
  build-and-test:
    runs-on: macos-26-xlarge
    timeout-minutes: 8
    steps:
    - uses: actions/checkout@v4

    - name: Select Xcode
      run: sudo xcode-select -switch /Applications/Xcode_26.1.1.app

    - name: Xcode version
      run: /usr/bin/xcodebuild -version

    - name: Run Domain Tests
      run: xcodebuild test -project RickAndMorty/RickAndMorty.xcodeproj -scheme "RickAndMortyDomain" -destination "platform=macOS" CODE_SIGN_IDENTITY="" CODE_SIGNING_REQUIRED=NO CODE_SIGNING_ALLOWED=NO -enableThreadSanitizer YES ONLY_ACTIVE_ARCH=YES
