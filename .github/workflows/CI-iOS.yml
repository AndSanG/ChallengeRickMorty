name: CI-iOS

on:
  push:
    branches: [ master ]

jobs:
  build-and-test:
    runs-on: macos-26-xlarge
    timeout-minutes: 8
    steps:
    - uses: actions/checkout@v4

    - name: Select Xcode
      run: sudo xcode-select -switch /Applications/Xcode_26.1.1.app

    - name: Xcode version
      run: /usr/bin/xcodebuild -version

    - name: Build and Test
      run: xcodebuild clean build -project RickAndMorty/RickAndMorty.xcodeproj -scheme "RickAndMorty" CODE_SIGN_IDENTITY="" CODE_SIGNING_REQUIRED=NO -destination "platform=iOS Simulator,name=iPhone 17 Pro" ONLY_ACTIVE_ARCH=YES
